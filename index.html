<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoffeeLA — My Independent Coffee Shop Journal</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream: #faf5ec;
    --cream-2: #f1e7d6;
    --espresso: #362219;
    --espresso-soft: #55392b;
    --coffee: #8a5a3b;
    --coffee-2: #b9764a;
    --accent: #d9822b;
    --line: #e6d9c3;
    --danger: #b3402c;
    --shadow: 0 8px 24px rgba(54,34,25,0.14);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;font-family:'Inter',sans-serif;color:var(--espresso);background:var(--cream);}
  button{font-family:'Inter',sans-serif;}

  .app{display:flex;height:100vh;width:100vw;overflow:hidden;}

  /* ---------- Sidebar ---------- */
  .sidebar{
    width:400px;
    min-width:400px;
    background:var(--cream);
    border-right:1px solid var(--line);
    display:flex;
    flex-direction:column;
    height:100vh;
  }
  .sidebar-header{
    padding:22px 22px 16px 22px;
    border-bottom:1px solid var(--line);
  }
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:6px;
  }
  .brand-mark{
    width:34px;height:34px;border-radius:10px;
    background:linear-gradient(135deg,var(--coffee-2),var(--espresso-soft));
    display:flex;align-items:center;justify-content:center;
    font-size:18px;flex-shrink:0;
    box-shadow:var(--shadow);
  }
  .brand h1{
    font-family:'Fraunces',serif;
    font-size:22px;
    font-weight:600;
    margin:0;
    letter-spacing:-0.01em;
  }
  .subtitle{
    font-size:13.5px;
    color:var(--espresso-soft);
    opacity:0.75;
    margin:0 0 14px 0;
    line-height:1.4;
  }
  .btn-primary{
    width:100%;
    padding:11px 14px;
    border-radius:10px;
    border:none;
    background:var(--espresso);
    color:var(--cream);
    font-size:13.5px;
    font-weight:600;
    cursor:pointer;
    margin-bottom:12px;
    transition:background .12s ease;
  }
  .btn-primary:hover{background:var(--coffee);}
  .btn-primary.placing{background:var(--accent);color:#fff;}

  .search-box{
    position:relative;
  }
  .search-box input{
    width:100%;
    padding:10px 14px 10px 34px;
    border-radius:10px;
    border:1px solid var(--line);
    background:#fff;
    font-family:'Inter',sans-serif;
    font-size:13.5px;
    color:var(--espresso);
    outline:none;
  }
  .search-box input:focus{border-color:var(--coffee-2);}
  .search-box::before{
    content:"⌕";
    position:absolute;
    left:11px;top:50%;
    transform:translateY(-50%);
    color:var(--coffee);
    font-size:16px;
    font-weight:700;
  }

  .filters{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    padding:14px 22px;
    border-bottom:1px solid var(--line);
    max-height:110px;
    overflow-y:auto;
  }
  .filters.hidden{display:none;}
  .chip{
    font-size:12px;
    font-weight:500;
    padding:6px 12px;
    border-radius:999px;
    border:1px solid var(--line);
    background:#fff;
    color:var(--espresso-soft);
    cursor:pointer;
    white-space:nowrap;
    transition:all .12s ease;
  }
  .chip:hover{border-color:var(--coffee-2);}
  .chip.active{
    background:var(--espresso);
    border-color:var(--espresso);
    color:var(--cream);
  }

  .list-count{
    padding:12px 22px 4px 22px;
    font-size:11.5px;
    text-transform:uppercase;
    letter-spacing:.06em;
    color:var(--espresso-soft);
    opacity:0.6;
    font-weight:600;
  }

  .shop-list{
    flex:1;
    overflow-y:auto;
    padding:6px 14px 20px 14px;
  }

  .empty-state{
    margin:24px 14px;
    padding:26px 20px;
    border:1.5px dashed var(--line);
    border-radius:14px;
    text-align:center;
  }
  .empty-state .emoji{font-size:30px;margin-bottom:8px;}
  .empty-state h3{
    font-family:'Fraunces',serif;
    font-size:16px;margin:0 0 6px 0;color:var(--espresso);
  }
  .empty-state p{
    font-size:12.5px;color:var(--espresso-soft);opacity:0.8;
    line-height:1.5;margin:0;
  }

  .shop-card{
    display:flex;
    gap:12px;
    padding:12px;
    border-radius:12px;
    cursor:pointer;
    border:1px solid transparent;
    margin-bottom:4px;
    position:relative;
    transition:background .12s ease, border-color .12s ease;
  }
  .shop-card:hover{background:var(--cream-2);}
  .shop-card:hover .card-actions{opacity:1;}
  .shop-card.selected{background:#fff;border-color:var(--coffee-2);box-shadow:var(--shadow);}
  .shop-thumb{
    width:56px;height:56px;border-radius:9px;flex-shrink:0;
    background-size:cover;background-position:center;
    background-color:var(--cream-2);
    display:flex;align-items:center;justify-content:center;
    font-size:22px;
    box-shadow:inset 0 0 0 1px rgba(0,0,0,0.06);
  }
  .shop-card-body{min-width:0;flex:1;padding-right:44px;}
  .shop-card-name{
    font-size:14.5px;font-weight:600;color:var(--espresso);
    margin:0 0 2px 0;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .shop-card-meta{
    font-size:12px;color:var(--espresso-soft);opacity:0.8;
    display:flex;align-items:center;gap:6px;flex-wrap:wrap;
    margin-bottom:3px;
  }
  .stars{color:var(--accent);font-size:12px;letter-spacing:1px;}
  .shop-card-blurb{
    font-size:12px;
    color:var(--espresso-soft);
    opacity:0.75;
    line-height:1.35;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }
  .neighborhood-tag{
    font-size:10.5px;
    font-weight:600;
    padding:2px 7px;
    border-radius:5px;
    background:var(--cream-2);
    color:var(--coffee);
  }
  .visit-date{font-size:11px;opacity:0.7;}

  .card-actions{
    position:absolute;
    top:10px;right:10px;
    display:flex;gap:4px;
    opacity:0;
    transition:opacity .12s ease;
  }
  .icon-btn{
    width:26px;height:26px;
    border-radius:7px;
    border:1px solid var(--line);
    background:#fff;
    display:flex;align-items:center;justify-content:center;
    font-size:12px;cursor:pointer;
    color:var(--espresso-soft);
  }
  .icon-btn:hover{background:var(--cream-2);}
  .icon-btn.danger:hover{background:#fbe4de;color:var(--danger);border-color:var(--danger);}

  .sidebar-footer{
    padding:12px 22px;
    border-top:1px solid var(--line);
    display:flex;
    gap:14px;
    font-size:12px;
  }
  .link-btn{
    background:none;border:none;padding:0;
    color:var(--espresso-soft);
    text-decoration:underline;
    cursor:pointer;
    font-size:12px;
    font-family:'Inter',sans-serif;
  }
  .link-btn:hover{color:var(--coffee);}

  /* ---------- Map ---------- */
  .map-wrap{flex:1;position:relative;}
  #map{width:100%;height:100%;background:#e9e2d3;}
  #map.placing{cursor:crosshair;}

  .placing-banner{
    position:absolute;
    top:18px;left:50%;
    transform:translateX(-50%);
    background:var(--espresso);
    color:var(--cream);
    padding:10px 18px;
    border-radius:999px;
    font-size:13px;
    font-weight:500;
    box-shadow:var(--shadow);
    z-index:1000;
    display:flex;align-items:center;gap:10px;
  }
  .placing-banner button{
    background:rgba(255,255,255,0.15);
    border:none;color:var(--cream);
    border-radius:999px;padding:4px 10px;
    font-size:12px;cursor:pointer;
  }
  .placing-banner.hidden{display:none;}

  .coffee-pin{
    width:34px;height:34px;
    border-radius:50% 50% 50% 0;
    background:linear-gradient(135deg,var(--coffee-2),var(--espresso-soft));
    transform:rotate(45deg);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 3px 8px rgba(54,34,25,0.35);
    border:2px solid #fff;
  }
  .coffee-pin span{transform:rotate(-45deg);font-size:15px;}
  .coffee-pin.temp{background:linear-gradient(135deg,var(--accent),#b5501a);}

  /* ---------- Popup ---------- */
  .leaflet-popup-content-wrapper{
    border-radius:16px;
    padding:0;
    overflow:hidden;
    box-shadow:0 12px 32px rgba(54,34,25,0.28);
  }
  .leaflet-popup-content{margin:0;width:290px !important;}
  .leaflet-popup-tip{background:#fff;}
  .popup-photo{
    width:100%;height:150px;
    background-size:cover;background-position:center;
    background-color:var(--cream-2);
    display:flex;align-items:center;justify-content:center;
    font-size:36px;
  }
  .popup-body{padding:16px 18px 18px 18px;}
  .popup-name{
    font-family:'Fraunces',serif;
    font-size:18px;font-weight:600;
    margin:0 0 4px 0;color:var(--espresso);
  }
  .popup-meta{
    display:flex;align-items:center;gap:8px;
    margin-bottom:9px;flex-wrap:wrap;
  }
  .popup-blurb{
    font-size:13px;line-height:1.5;
    color:var(--espresso-soft);
    margin:0 0 12px 0;
    white-space:pre-wrap;
  }
  .popup-address{
    font-size:12px;
    color:var(--espresso-soft);
    opacity:0.7;
    margin:0 0 12px 0;
  }
  .popup-actions{display:flex;gap:8px;}
  .popup-link{
    display:inline-block;
    font-size:12.5px;font-weight:600;
    color:#fff;
    background:var(--espresso);
    padding:8px 14px;
    border-radius:8px;
    text-decoration:none;
    border:none;cursor:pointer;
  }
  .popup-link:hover{background:var(--coffee);}
  .popup-link.secondary{background:#fff;color:var(--espresso);border:1px solid var(--line);}
  .popup-link.secondary:hover{background:var(--cream-2);}

  /* scrollbars */
  .shop-list::-webkit-scrollbar, .filters::-webkit-scrollbar{width:6px;height:6px;}
  .shop-list::-webkit-scrollbar-thumb, .filters::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px;}

  /* ---------- Modal ---------- */
  .modal-overlay{
    position:fixed;inset:0;
    background:rgba(54,34,25,0.35);
    display:flex;align-items:center;justify-content:center;
    z-index:2000;
  }
  .modal-overlay.hidden{display:none;}
  .modal{
    width:420px;max-width:92vw;
    max-height:88vh;
    overflow-y:auto;
    background:var(--cream);
    border-radius:18px;
    padding:26px 26px 20px 26px;
    box-shadow:0 20px 60px rgba(54,34,25,0.35);
  }
  .modal h2{
    font-family:'Fraunces',serif;
    font-size:20px;margin:0 0 4px 0;
  }
  .modal .modal-sub{
    font-size:12.5px;color:var(--espresso-soft);opacity:0.75;
    margin:0 0 18px 0;
  }
  .field{margin-bottom:14px;}
  .field label{
    display:block;
    font-size:12.5px;font-weight:600;
    color:var(--espresso-soft);
    margin-bottom:6px;
  }
  .field input[type=text], .field input[type=date], .field textarea{
    width:100%;
    padding:9px 12px;
    border-radius:9px;
    border:1px solid var(--line);
    background:#fff;
    font-family:'Inter',sans-serif;
    font-size:13.5px;
    color:var(--espresso);
    outline:none;
  }
  .field input:focus, .field textarea:focus{border-color:var(--coffee-2);}
  .field textarea{resize:vertical;min-height:76px;line-height:1.4;}

  .star-picker{display:flex;gap:6px;}
  .star-picker .star{
    font-size:24px;
    cursor:pointer;
    color:var(--line);
    line-height:1;
  }
  .star-picker .star.filled{color:var(--accent);}

  .photo-input-row{display:flex;align-items:center;gap:12px;}
  .photo-btn{
    padding:9px 14px;
    border-radius:9px;
    border:1px solid var(--line);
    background:#fff;
    font-size:12.5px;font-weight:600;
    color:var(--espresso-soft);
    cursor:pointer;
  }
  .photo-btn:hover{background:var(--cream-2);}
  .photo-preview{
    width:56px;height:56px;border-radius:9px;
    background-size:cover;background-position:center;
    display:none;
    box-shadow:inset 0 0 0 1px rgba(0,0,0,0.08);
  }
  .photo-remove{
    font-size:11.5px;color:var(--danger);
    background:none;border:none;cursor:pointer;
    text-decoration:underline;display:none;
  }

  .modal-actions{
    display:flex;justify-content:flex-end;gap:10px;
    margin-top:8px;
  }
  .btn-secondary{
    padding:9px 16px;border-radius:9px;
    border:1px solid var(--line);
    background:#fff;color:var(--espresso-soft);
    font-size:13px;font-weight:600;cursor:pointer;
  }
  .btn-secondary:hover{background:var(--cream-2);}
  .btn-save{
    padding:9px 18px;border-radius:9px;
    border:none;background:var(--espresso);color:var(--cream);
    font-size:13px;font-weight:600;cursor:pointer;
  }
  .btn-save:hover{background:var(--coffee);}

  @media (max-width: 860px){
    .app{flex-direction:column;}
    .sidebar{width:100%;min-width:0;height:46%;border-right:none;border-bottom:1px solid var(--line);}
    .map-wrap{height:54%;}
  }
</style>
</head>
<body>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="brand">
        <div class="brand-mark">☕</div>
        <h1>CoffeeLA</h1>
      </div>
      <p class="subtitle">Your personal log of independent LA coffee shops — add each one after you visit.</p>
      <button class="btn-primary" id="addShopBtn">+ Add a Shop You Visited</button>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search your shops…" />
      </div>
    </div>
    <div class="filters hidden" id="filters"></div>
    <div class="list-count" id="listCount">0 shops</div>
    <div class="shop-list" id="shopList"></div>
    <div class="sidebar-footer">
      <button class="link-btn" id="exportBtn">Export backup</button>
      <label class="link-btn" for="importFile">Import backup</label>
      <input type="file" id="importFile" accept="application/json" hidden />
    </div>
  </div>
  <div class="map-wrap">
    <div id="map"></div>
    <div class="placing-banner hidden" id="placingBanner">
      📍 Click anywhere on the map to drop a pin
      <button id="cancelPlacing">Cancel</button>
    </div>
  </div>
</div>

<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Add a Shop</h2>
    <p class="modal-sub" id="modalSub">Fill in a few details about your visit.</p>
    <form id="shopForm">
      <div class="field">
        <label for="fName">Shop name</label>
        <input type="text" id="fName" required placeholder="e.g. Canyon Coffee" />
      </div>
      <div class="field">
        <label for="fNeighborhood">Neighborhood / area</label>
        <input type="text" id="fNeighborhood" placeholder="e.g. Echo Park" />
      </div>
      <div class="field">
        <label for="fDate">Date visited</label>
        <input type="date" id="fDate" />
      </div>
      <div class="field">
        <label>Your rating</label>
        <div class="star-picker" id="starPicker"></div>
      </div>
      <div class="field">
        <label for="fReview">Your review</label>
        <textarea id="fReview" placeholder="What did you order? What was the vibe? Would you go back?"></textarea>
      </div>
      <div class="field">
        <label>Photo (optional)</label>
        <div class="photo-input-row">
          <button type="button" class="photo-btn" id="photoBtn">Choose photo</button>
          <input type="file" id="fPhoto" accept="image/*" hidden />
          <div class="photo-preview" id="photoPreview"></div>
          <button type="button" class="photo-remove" id="photoRemove">Remove</button>
        </div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn-secondary" id="cancelBtn">Cancel</button>
        <button type="submit" class="btn-save" id="saveBtn">Save Shop</button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script>
const STORAGE_KEY = 'coffeeLA_shops';

function loadShops(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : [];
  }catch(e){
    console.error('Could not read saved shops', e);
    return [];
  }
}
function saveShops(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(shops));
}

let shops = loadShops();

// ---------- Map setup ----------
const mapEl = document.getElementById('map');
const map = L.map('map', { zoomControl: true }).setView([34.05, -118.3], 10);

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
  maxZoom: 19
}).addTo(map);

function starString(rating){
  const full = Math.floor(rating);
  const half = rating - full >= 0.5;
  let s = "★".repeat(full);
  if(half) s += "½";
  s += "☆".repeat(5 - Math.ceil(rating));
  return s;
}

function makeIcon(temp){
  return L.divIcon({
    className: '',
    html: '<div class="coffee-pin' + (temp ? ' temp' : '') + '"><span>☕</span></div>',
    iconSize: [34, 34],
    iconAnchor: [17, 32],
    popupAnchor: [0, -30]
  });
}

function mapsLink(shop){
  const q = shop.address ? (shop.name + ", " + shop.address) : (shop.lat + "," + shop.lng);
  return "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(q);
}

function formatDate(iso){
  if(!iso) return "";
  const d = new Date(iso + "T00:00:00");
  if(isNaN(d)) return iso;
  return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
}

function photoOrPlaceholder(shop, className){
  if(shop.photo){
    return `<div class="${className}" style="background-image:url('${shop.photo}')"></div>`;
  }
  return `<div class="${className}">☕</div>`;
}

function popupHTML(shop){
  return `
    ${photoOrPlaceholder(shop, 'popup-photo')}
    <div class="popup-body">
      <h3 class="popup-name">${escapeHTML(shop.name)}</h3>
      <div class="popup-meta">
        <span class="stars">${starString(shop.rating)}</span>
        ${shop.neighborhood ? `<span class="neighborhood-tag">${escapeHTML(shop.neighborhood)}</span>` : ''}
        ${shop.dateVisited ? `<span class="visit-date">Visited ${formatDate(shop.dateVisited)}</span>` : ''}
      </div>
      ${shop.review ? `<p class="popup-blurb">${escapeHTML(shop.review)}</p>` : ''}
      <div class="popup-actions">
        <a class="popup-link" href="${mapsLink(shop)}" target="_blank" rel="noopener">Directions →</a>
        <button class="popup-link secondary" onclick="editShop('${shop.id}')">Edit</button>
        <button class="popup-link secondary" onclick="deleteShop('${shop.id}')">Delete</button>
      </div>
    </div>
  `;
}

function escapeHTML(str){
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

const markers = {};

function addMarkerForShop(shop){
  const marker = L.marker([shop.lat, shop.lng], { icon: makeIcon(false) }).addTo(map);
  marker.bindPopup(popupHTML(shop), { maxWidth: 300, minWidth: 290 });
  markers[shop.id] = marker;
}

shops.forEach(addMarkerForShop);

// ---------- Sidebar: filters ----------
const filtersEl = document.getElementById('filters');
let activeFilter = "All";
let searchTerm = "";

function renderFilters(){
  const tags = Array.from(new Set(shops.map(s => (s.neighborhood || '').trim()).filter(Boolean))).sort();
  filtersEl.innerHTML = '';
  if(tags.length < 2){
    filtersEl.classList.add('hidden');
    return;
  }
  filtersEl.classList.remove('hidden');
  ["All", ...tags].forEach(n => {
    const chip = document.createElement('div');
    chip.className = 'chip' + (n === activeFilter ? ' active' : '');
    chip.textContent = n;
    chip.addEventListener('click', () => {
      activeFilter = n;
      render();
    });
    filtersEl.appendChild(chip);
  });
}

document.getElementById('searchInput').addEventListener('input', (e) => {
  searchTerm = e.target.value.trim().toLowerCase();
  render();
});

// ---------- Sidebar: list ----------
const listEl = document.getElementById('shopList');
const countEl = document.getElementById('listCount');
let selectedId = null;

function matches(shop){
  const passesFilter = activeFilter === "All" || (shop.neighborhood || '') === activeFilter;
  const hay = [shop.name, shop.neighborhood, shop.review].filter(Boolean).join(' ').toLowerCase();
  const passesSearch = !searchTerm || hay.includes(searchTerm);
  return passesFilter && passesSearch;
}

function render(){
  renderFilters();
  listEl.innerHTML = '';
  let visibleCount = 0;

  if(shops.length === 0){
    listEl.innerHTML = `
      <div class="empty-state">
        <div class="emoji">🗺️</div>
        <h3>No shops yet</h3>
        <p>Your map is blank on purpose. Click "+ Add a Shop You Visited" and drop a pin the next time you grab a coffee somewhere new.</p>
      </div>
    `;
    countEl.textContent = '0 shops';
    return;
  }

  const sorted = [...shops].sort((a, b) => (b.dateVisited || '').localeCompare(a.dateVisited || ''));

  sorted.forEach((shop) => {
    const visible = matches(shop);
    if(markers[shop.id]) markers[shop.id].setOpacity(visible ? 1 : 0.15);
    if(!visible) return;
    visibleCount++;

    const card = document.createElement('div');
    card.className = 'shop-card' + (selectedId === shop.id ? ' selected' : '');
    card.innerHTML = `
      ${photoOrPlaceholder(shop, 'shop-thumb')}
      <div class="shop-card-body">
        <p class="shop-card-name">${escapeHTML(shop.name)}</p>
        <div class="shop-card-meta">
          <span class="stars">${starString(shop.rating)}</span>
          ${shop.neighborhood ? `<span class="neighborhood-tag">${escapeHTML(shop.neighborhood)}</span>` : ''}
          ${shop.dateVisited ? `<span class="visit-date">${formatDate(shop.dateVisited)}</span>` : ''}
        </div>
        ${shop.review ? `<p class="shop-card-blurb">${escapeHTML(shop.review)}</p>` : ''}
      </div>
      <div class="card-actions">
        <div class="icon-btn" title="Edit" onclick="editShop('${shop.id}', event)">✎</div>
        <div class="icon-btn danger" title="Delete" onclick="deleteShop('${shop.id}', event)">🗑</div>
      </div>
    `;
    card.addEventListener('click', (e) => {
      if(e.target.closest('.card-actions')) return;
      selectedId = shop.id;
      map.flyTo([shop.lat, shop.lng], 14, { duration: 0.6 });
      markers[shop.id].openPopup();
      render();
    });
    listEl.appendChild(card);
  });

  countEl.textContent = visibleCount + (visibleCount === 1 ? ' shop' : ' shops');
}

map.on('popupopen', (e) => {
  const id = Object.keys(markers).find(k => markers[k] === e.popup._source);
  if(id !== undefined){
    selectedId = id;
    render();
  }
});

// ---------- Add / Edit flow ----------
let placingPin = false;
let pendingLatLng = null;
let tempMarker = null;
let editingId = null;

const addShopBtn = document.getElementById('addShopBtn');
const placingBanner = document.getElementById('placingBanner');
const modalOverlay = document.getElementById('modalOverlay');
const modalTitle = document.getElementById('modalTitle');
const modalSub = document.getElementById('modalSub');
const shopForm = document.getElementById('shopForm');
const fName = document.getElementById('fName');
const fNeighborhood = document.getElementById('fNeighborhood');
const fDate = document.getElementById('fDate');
const fReview = document.getElementById('fReview');
const starPicker = document.getElementById('starPicker');
const photoBtn = document.getElementById('photoBtn');
const fPhoto = document.getElementById('fPhoto');
const photoPreview = document.getElementById('photoPreview');
const photoRemove = document.getElementById('photoRemove');
const cancelBtn = document.getElementById('cancelBtn');
const cancelPlacing = document.getElementById('cancelPlacing');

let currentRating = 5;
let currentPhotoDataUrl = null;

function buildStarPicker(){
  starPicker.innerHTML = '';
  for(let i = 1; i <= 5; i++){
    const s = document.createElement('span');
    s.className = 'star';
    s.textContent = '★';
    s.dataset.value = i;
    s.addEventListener('click', () => {
      currentRating = i;
      updateStarPicker();
    });
    starPicker.appendChild(s);
  }
}
function updateStarPicker(){
  Array.from(starPicker.children).forEach(s => {
    s.classList.toggle('filled', Number(s.dataset.value) <= currentRating);
  });
}
buildStarPicker();

function todayISO(){
  const d = new Date();
  return d.toISOString().slice(0, 10);
}

function resizeImage(file, maxWidth = 900, quality = 0.75){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxWidth / img.width);
        const w = Math.round(img.width * scale);
        const h = Math.round(img.height * scale);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

photoBtn.addEventListener('click', () => fPhoto.click());
fPhoto.addEventListener('change', async () => {
  const file = fPhoto.files[0];
  if(!file) return;
  currentPhotoDataUrl = await resizeImage(file);
  photoPreview.style.backgroundImage = `url('${currentPhotoDataUrl}')`;
  photoPreview.style.display = 'block';
  photoRemove.style.display = 'inline';
});
photoRemove.addEventListener('click', () => {
  currentPhotoDataUrl = null;
  fPhoto.value = '';
  photoPreview.style.display = 'none';
  photoRemove.style.display = 'none';
});

function startPlacingPin(){
  placingPin = true;
  mapEl.classList.add('placing');
  placingBanner.classList.remove('hidden');
  addShopBtn.classList.add('placing');
  addShopBtn.textContent = 'Click the map to place a pin…';
}
function stopPlacingPin(){
  placingPin = false;
  mapEl.classList.remove('placing');
  placingBanner.classList.add('hidden');
  addShopBtn.classList.remove('placing');
  addShopBtn.textContent = '+ Add a Shop You Visited';
}

addShopBtn.addEventListener('click', () => {
  if(placingPin){ stopPlacingPin(); return; }
  startPlacingPin();
});
cancelPlacing.addEventListener('click', stopPlacingPin);

map.on('click', (e) => {
  if(!placingPin) return;
  pendingLatLng = e.latlng;
  stopPlacingPin();

  if(tempMarker) map.removeLayer(tempMarker);
  tempMarker = L.marker(e.latlng, { icon: makeIcon(true), draggable: true }).addTo(map);
  tempMarker.on('dragend', () => { pendingLatLng = tempMarker.getLatLng(); });

  openModal('add');
});

function openModal(mode, shop){
  editingId = mode === 'edit' ? shop.id : null;
  modalTitle.textContent = mode === 'edit' ? 'Edit Shop' : 'Add a Shop';
  modalSub.textContent = mode === 'edit'
    ? 'Update your notes for this visit.'
    : 'Drop a pin, then tell us about it. Drag the orange pin on the map to fine-tune the spot.';

  fName.value = shop ? shop.name : '';
  fNeighborhood.value = shop ? (shop.neighborhood || '') : '';
  fDate.value = shop ? (shop.dateVisited || todayISO()) : todayISO();
  fReview.value = shop ? (shop.review || '') : '';
  currentRating = shop ? shop.rating : 5;
  updateStarPicker();
  currentPhotoDataUrl = shop ? (shop.photo || null) : null;
  if(currentPhotoDataUrl){
    photoPreview.style.backgroundImage = `url('${currentPhotoDataUrl}')`;
    photoPreview.style.display = 'block';
    photoRemove.style.display = 'inline';
  }else{
    photoPreview.style.display = 'none';
    photoRemove.style.display = 'none';
  }
  fPhoto.value = '';

  modalOverlay.classList.remove('hidden');
  setTimeout(() => fName.focus(), 50);
}

function closeModal(discardTemp){
  modalOverlay.classList.add('hidden');
  if(discardTemp && tempMarker){
    map.removeLayer(tempMarker);
    tempMarker = null;
    pendingLatLng = null;
  }
  editingId = null;
}

cancelBtn.addEventListener('click', () => closeModal(true));

shopForm.addEventListener('submit', (e) => {
  e.preventDefault();
  const name = fName.value.trim();
  if(!name) return;

  if(editingId){
    const shop = shops.find(s => s.id === editingId);
    shop.name = name;
    shop.neighborhood = fNeighborhood.value.trim();
    shop.dateVisited = fDate.value;
    shop.rating = currentRating;
    shop.review = fReview.value.trim();
    shop.photo = currentPhotoDataUrl;
    markers[shop.id].setPopupContent(popupHTML(shop));
  } else {
    const shop = {
      id: 'shop_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7),
      name,
      neighborhood: fNeighborhood.value.trim(),
      dateVisited: fDate.value,
      rating: currentRating,
      review: fReview.value.trim(),
      photo: currentPhotoDataUrl,
      lat: pendingLatLng.lat,
      lng: pendingLatLng.lng
    };
    shops.push(shop);
    if(tempMarker){ map.removeLayer(tempMarker); tempMarker = null; }
    addMarkerForShop(shop);
  }

  saveShops();
  closeModal(false);
  render();
});

window.editShop = function(id){
  const shop = shops.find(s => s.id === id);
  if(!shop) return;
  map.closePopup();
  openModal('edit', shop);
};

window.deleteShop = function(id){
  const shop = shops.find(s => s.id === id);
  if(!shop) return;
  if(!confirm(`Delete "${shop.name}" from your journal? This can't be undone.`)) return;
  if(markers[id]){ map.removeLayer(markers[id]); delete markers[id]; }
  shops = shops.filter(s => s.id !== id);
  saveShops();
  render();
};

// ---------- Export / Import ----------
document.getElementById('exportBtn').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(shops, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = todayISO();
  a.href = url;
  a.download = `coffeela-backup-${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
});

document.getElementById('importFile').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (evt) => {
    try{
      const imported = JSON.parse(evt.target.result);
      if(!Array.isArray(imported)) throw new Error('Not a valid backup file');
      const withNewIds = imported.map(s => ({
        ...s,
        id: 'shop_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7)
      }));
      shops = shops.concat(withNewIds);
      saveShops();
      withNewIds.forEach(addMarkerForShop);
      render();
      alert(`Imported ${withNewIds.length} shop(s).`);
    }catch(err){
      alert('Could not read that file: ' + err.message);
    }
    e.target.value = '';
  };
  reader.readAsText(file);
});

render();
</script>
